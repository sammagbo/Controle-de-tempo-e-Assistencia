spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:meeting_db}
    username: ${DB_USER:meeting_user}
    password: ${DB_PASSWORD:meeting_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE
  session:
    timeout: 30d
    jdbc:
      initialize-schema: never
  web:
    error:
      include-message: always
      include-binding-errors: always

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:4173}
