version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: meetingmanager_db
    environment:
      POSTGRES_USER: meeting_user
      POSTGRES_PASSWORD: meeting_password
      POSTGRES_DB: meeting_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting_user -d meeting_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    container_name: meetingmanager_flyway
    command: -url=jdbc:postgresql://postgres:5432/meeting_db -user=meeting_user -password=meeting_password -connectRetries=10 migrate
    volumes:
      - ./backend/src/main/resources/db/migration:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./backend
    container_name: meetingmanager_api
    profiles: ["full"]
    environment:
      DB_HOST: postgres
      DB_NAME: meeting_db
      DB_USER: meeting_user
      DB_PASSWORD: meeting_password
      CORS_ALLOWED_ORIGINS: http://localhost:8081,http://localhost:3000,http://localhost:5173,http://localhost:4173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: meetingmanager_web
    profiles: ["full"]
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  pgdata:
